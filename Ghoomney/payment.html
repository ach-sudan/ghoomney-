<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghoomney - Secure Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0a; color: #ffffff; }
        :root { --primary: #c8a55b; --primary-dark: #b8923a; --dark: #0a0a0a; --dark-gray: #111111; --light-gray: #1a1a1a; --text-muted: #888888; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 2rem; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .payment-card { background: var(--light-gray); border-radius: 30px; padding: 2rem; border: 1px solid rgba(200,165,91,0.3); width: 100%; }
        .payment-header { text-align: center; margin-bottom: 2rem; }
        .payment-header i { font-size: 3rem; color: var(--primary); margin-bottom: 1rem; }
        .payment-header h1 { font-size: 1.8rem; }
        .payment-header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }
        
        .payment-amount { background: rgba(200,165,91,0.1); border-radius: 20px; padding: 1rem; text-align: center; margin-bottom: 2rem; }
        .payment-amount .label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; }
        .payment-amount .amount { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .payment-amount .vehicle { font-size: 0.9rem; color: var(--text-muted); margin-top: 0.3rem; }
        
        .payment-methods { margin-bottom: 1.5rem; }
        .method-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.8rem; color: var(--text-muted); }
        .method-options { display: flex; flex-direction: column; gap: 0.8rem; }
        .method-option { display: flex; align-items: center; gap: 0.8rem; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer; border: 1px solid transparent; transition: all 0.3s; }
        .method-option:hover, .method-option.selected { background: rgba(200,165,91,0.1); border-color: rgba(200,165,91,0.3); }
        .method-option input { width: auto; margin: 0; }
        .method-option i { width: 30px; font-size: 1.2rem; color: var(--primary); }
        .method-option .method-name { flex: 1; font-weight: 500; }
        
        .payment-fields { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .input-group { margin-bottom: 1rem; }
        .input-group input { width: 100%; padding: 1rem; background: var(--dark); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1rem; }
        .input-group input:focus { outline: none; border-color: var(--primary); }
        .input-row { display: flex; gap: 1rem; }
        .input-row .input-group { flex: 1; }
        
        .bank-info { background: rgba(200,165,91,0.1); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; }
        .bank-info p { margin: 0.3rem 0; font-size: 0.85rem; }
        
        .pay-btn { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--dark); border: none; padding: 1rem; border-radius: 40px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 1.5rem; }
        .pay-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(200,165,91,0.3); }
        
        .back-link { text-align: center; margin-top: 1.5rem; }
        .back-link a { color: var(--primary); text-decoration: none; font-size: 0.9rem; }
        
        .toast-message { position: fixed; bottom: 30px; right: 30px; background: var(--light-gray); padding: 12px 24px; border-radius: 50px; z-index: 2000; display: flex; align-items: center; gap: 10px; border-left: 3px solid; }
        .toast-message.success { border-left-color: #10b981; }
        .toast-message.error { border-left-color: #ef4444; }
        
        @media (max-width: 768px) { .container { padding: 1rem; } .payment-card { padding: 1.5rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="payment-card">
        <div class="payment-header">
            <i class="fas fa-lock"></i>
            <h1>Secure Payment</h1>
            <p>Complete your booking with secure payment</p>
        </div>
        
        <div class="payment-amount" id="paymentAmount">
            <div class="label">Total Amount</div>
            <div class="amount" id="totalAmount">NPR 0</div>
            <div class="vehicle" id="vehicleName"></div>
        </div>
        
        <div class="payment-methods">
            <div class="method-title">Select Payment Method</div>
            <div class="method-options">
                <div class="method-option" onclick="selectMethod('card')">
                    <input type="radio" name="payment_method" value="card" id="methodCard" checked>
                    <i class="fas fa-credit-card"></i>
                    <span class="method-name">Credit / Debit Card</span>
                    <i class="fas fa-check-circle" style="color:#10b981; display:none;"></i>
                </div>
                <div class="method-option" onclick="selectMethod('esewa')">
                    <input type="radio" name="payment_method" value="esewa" id="methodEsewa">
                    <i class="fas fa-mobile-alt"></i>
                    <span class="method-name">eSewa / Khalti</span>
                </div>
                <div class="method-option" onclick="selectMethod('bank')">
                    <input type="radio" name="payment_method" value="bank" id="methodBank">
                    <i class="fas fa-university"></i>
                    <span class="method-name">Bank Transfer</span>
                </div>
            </div>
        </div>
        
        <div id="cardFields" class="payment-fields">
            <div class="input-group"><input type="text" id="cardNumber" placeholder="Card Number (4242 4242 4242 4242)"></div>
            <div class="input-row">
                <div class="input-group"><input type="text" id="expiryDate" placeholder="MM/YY"></div>
                <div class="input-group"><input type="text" id="cvv" placeholder="CVV"></div>
            </div>
            <div class="input-group"><input type="text" id="cardName" placeholder="Name on Card"></div>
        </div>
        
        <div id="mobileFields" class="payment-fields" style="display: none;">
            <div class="input-group"><input type="text" id="mobileNumber" placeholder="Mobile Number (98XXXXXXXX)"></div>
            <div class="input-group"><input type="password" id="mobilePin" placeholder="MPIN / Password"></div>
        </div>
        
        <div id="bankFields" class="payment-fields" style="display: none;">
            <div class="bank-info">
                <p><i class="fas fa-building"></i> Bank: Nepal Investment Bank</p>
                <p><i class="fas fa-user"></i> Account Name: Ghoomney Rentals</p>
                <p><i class="fas fa-hashtag"></i> Account Number: 05780100123456</p>
            </div>
            <div class="input-group"><input type="text" id="bankRef" placeholder="Reference / Transaction ID"></div>
        </div>
        
        <button class="pay-btn" onclick="processPayment()"><i class="fas fa-lock"></i> Pay Now</button>
        
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
        </div>
    </div>
</div>

<div id="toastMessage" class="toast-message" style="display: none;"></div>

<script>
    let currentPayment = null;
    
    function showToast(message, type) {
        const toast = document.getElementById('toastMessage');
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        toast.className = `toast-message ${type}`;
        toast.style.display = 'flex';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    function loadPaymentDetails() {
        const paymentData = localStorage.getItem('currentPayment');
        if (paymentData) {
            currentPayment = JSON.parse(paymentData);
            document.getElementById('totalAmount').innerHTML = 'NPR ' + currentPayment.amount.toLocaleString();
            
            // Get vehicle name
            const vehicles = JSON.parse(localStorage.getItem('vehicles'));
            const bookings = JSON.parse(localStorage.getItem('bookings'));
            const booking = bookings.find(b => b.id === currentPayment.bookingId);
            if (booking) {
                const vehicle = vehicles.find(v => v.id === booking.vehicle_id);
                if (vehicle) document.getElementById('vehicleName').innerHTML = vehicle.name;
            }
        } else {
            document.getElementById('totalAmount').innerHTML = 'NPR 0';
        }
    }
    
    function selectMethod(method) {
        document.getElementById('cardFields').style.display = 'none';
        document.getElementById('mobileFields').style.display = 'none';
        document.getElementById('bankFields').style.display = 'none';
        
        document.getElementById('methodCard').checked = false;
        document.getElementById('methodEsewa').checked = false;
        document.getElementById('methodBank').checked = false;
        
        if (method === 'card') {
            document.getElementById('methodCard').checked = true;
            document.getElementById('cardFields').style.display = 'block';
        } else if (method === 'esewa') {
            document.getElementById('methodEsewa').checked = true;
            document.getElementById('mobileFields').style.display = 'block';
        } else if (method === 'bank') {
            document.getElementById('methodBank').checked = true;
            document.getElementById('bankFields').style.display = 'block';
        }
        
        document.querySelectorAll('.method-option').forEach(opt => opt.style.borderColor = 'transparent');
        event.target.closest('.method-option').style.borderColor = 'rgba(200,165,91,0.5)';
    }
    
    function processPayment() {
        const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;
        
        if (paymentMethod === 'card') {
            const cardNumber = document.getElementById('cardNumber').value;
            const expiryDate = document.getElementById('expiryDate').value;
            const cvv = document.getElementById('cvv').value;
            const cardName = document.getElementById('cardName').value;
            if (!cardNumber || !expiryDate || !cvv || !cardName) {
                showToast('Please fill all card details', 'error');
                return;
            }
            if (cardNumber.replace(/\s/g, '').length < 15) {
                showToast('Please enter valid card number', 'error');
                return;
            }
        } else if (paymentMethod === 'esewa') {
            const mobileNumber = document.getElementById('mobileNumber').value;
            const mobilePin = document.getElementById('mobilePin').value;
            if (!mobileNumber || !mobilePin) {
                showToast('Please fill mobile details', 'error');
                return;
            }
            if (mobileNumber.length < 10) {
                showToast('Please enter valid mobile number', 'error');
                return;
            }
        } else if (paymentMethod === 'bank') {
            const bankRef = document.getElementById('bankRef').value;
            if (!bankRef) {
                showToast('Please enter reference number', 'error');
                return;
            }
        }
        
        // Process payment
        if (currentPayment) {
            let bookings = JSON.parse(localStorage.getItem('bookings'));
            const booking = bookings.find(b => b.id === currentPayment.bookingId);
            if (booking) {
                booking.payment_status = 'paid';
                booking.transaction_id = 'TXN' + Date.now();
                localStorage.setItem('bookings', JSON.stringify(bookings));
                localStorage.removeItem('currentPayment');
                showToast('Payment successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                showToast('Booking not found', 'error');
            }
        } else {
            showToast('No payment pending', 'error');
        }
    }
    
    loadPaymentDetails();
</script>
</body>
</html>
